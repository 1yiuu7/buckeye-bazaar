<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Buckeye Bazaar</title>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="static/style.css" />
        <script type="text/javascript" src="static/index.js"></script>
    </head>
    <body onload="onLoad();">
        <div id="wrapper">
            <div id="nav">
                <div class="nav-entry clickable" onclick="switchPage('shop');"><strong>復興高中 AI 資安學程</strong></div>
                <div class="nav-entry" id="balance-desc">餘額: $0</div>
                <div class="nav-entry clickable" id="cart-desc" onclick="switchPage('cart');">購物車 (0)</div>
            </div>
            <div class="page" id="shop">
                <h1>可供購買的項目</h1>
                <div id="shop-content">
                    err
                </div>
            </div>
            <div class="page" id="cart" hidden>
                <h1>購物車</h1>
                <div id="cart-content">
                    err
                </div>
                <div id="purchase-button">以 $0 購買</div>
            </div>
            <div class="page" id="receipt" hidden>
                <h1>購買收據</h1>
                <h3>感謝您的購買！</h3>
                <div id="receipt-content">
                    err
                </div>
            </div>
        </div>
    </body>
</html>
